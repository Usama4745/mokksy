name: Bug Report
description: Report a bug or unexpected behavior in Mokksy
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: mokksy-version
    attributes:
      label: Mokksy version
      placeholder: "e.g. 0.8.2"
    validations:
      required: true

  - type: input
    id: kotlin-version
    attributes:
      label: Kotlin version
      placeholder: "e.g. 2.1.0"
    validations:
      required: true

  - type: input
    id: jvm-version
    attributes:
      label: JVM version
      placeholder: "e.g. OpenJDK 21.0.3"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest possible code snippet or a link to a repository that reproduces the issue.
      placeholder: |
        ```kotlin
        val mokksy = Mokksy()
        // ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant details (OS, Ktor version, target platform, etc.)
    validations:
      required: false
